name: Deploy to GitHub Pages

# The site is served from the gh-pages branch (repo root, no build step).
# This workflow keeps gh-pages in sync with main, so every merge to main deploys.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Sync main to gh-pages
        run: git push origin HEAD:gh-pages --force
