<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Tiny Taps — Little Learning Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@500;600;700&family=Cairo:wght@600;700&family=Fredoka:wght@500;600;700&family=Noto+Sans+Armenian:wght@500;600;700&family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg1:#fef6e4; --bg2:#ffe8d6; --ink:#3b3a52; --soft:#7a7894; --good:#7bd389; --shadow:rgba(59,58,82,.18); }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;}
  body{
    font-family:'Quicksand',sans-serif; color:var(--ink);
    background:
      radial-gradient(circle at 18% 12%, rgba(255,209,102,.45), transparent 42%),
      radial-gradient(circle at 85% 20%, rgba(160,231,229,.5), transparent 45%),
      radial-gradient(circle at 75% 90%, rgba(201,177,255,.4), transparent 45%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    display:flex; align-items:center; justify-content:center; overflow:hidden; user-select:none;
  }
  body.arabic, body.arabic *{ font-family:'Baloo Bhaijaan 2','Cairo','Quicksand',sans-serif; }
  body.armenian, body.armenian *{ font-family:'Noto Sans Armenian','Fredoka','Quicksand',sans-serif; }
  .stage{ width:100%; max-width:760px; height:100dvh; max-height:900px; position:relative; overflow:hidden; }

  .blob{position:absolute; border-radius:50%; filter:blur(2px); opacity:.5; z-index:0; pointer-events:none;}
  .blob.b1{width:90px;height:90px;background:#ffb3c1;top:8%;left:6%;animation:float 7s ease-in-out infinite;}
  .blob.b2{width:60px;height:60px;background:#9ad0c2;bottom:14%;left:10%;animation:float 9s ease-in-out infinite reverse;}
  .blob.b3{width:70px;height:70px;background:#cdb4f6;top:14%;right:8%;animation:float 8s ease-in-out infinite;}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}

  .screen{ position:absolute; inset:0; display:none; flex-direction:column; align-items:center; padding:16px 16px 22px; z-index:1; }
  .screen.active{ display:flex; }

  /* HOME */
  .home-head{ text-align:center; margin:8px 0 12px; z-index:2; display:flex; flex-direction:column; align-items:center; }
  .home-head h1{ font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(30px,8vw,46px); margin:0; color:var(--ink); line-height:1; }
  body.arabic .home-head h1{ font-family:'Baloo Bhaijaan 2','Cairo',sans-serif; }
  .home-head p{ font-weight:700; color:var(--soft); margin:7px 0 0; font-size:clamp(12px,3.4vw,15px); }
  .langbar{ margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
  .langpill{
    border:none; background:rgba(255,255,255,.72); color:var(--soft);
    font-family:'Noto Sans Armenian','Baloo Bhaijaan 2','Cairo','Quicksand',sans-serif; font-weight:700; font-size:14px;
    padding:7px 16px; border-radius:999px; cursor:pointer; box-shadow:0 4px 0 rgba(59,58,82,.12);
  }
  .langpill.active{ background:var(--ink); color:#fff; }
  .langpill:active{ transform:translateY(3px); box-shadow:none; }
  .grid{
    width:100%; flex:1; min-height:0; display:grid;
    grid-template-columns:repeat(2,1fr); grid-template-rows:repeat(3,1fr);
    gap:clamp(10px,2.8vw,16px); padding:2px; overflow:hidden;
  }
  .tile{
    border:none; border-radius:26px; min-height:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    cursor:pointer; color:#fff; font-family:'Fredoka',sans-serif; font-weight:600; position:relative;
    box-shadow:0 9px 0 var(--shadow), 0 14px 24px rgba(0,0,0,.12); transition:transform .12s, box-shadow .12s;
  }
  body.arabic .tile{ font-family:'Baloo Bhaijaan 2','Cairo',sans-serif; }
  .tile.span2{ grid-column:1 / -1; }
  .tile .emoji{ font-size:clamp(34px,9vw,52px); line-height:1; filter:drop-shadow(0 3px 0 rgba(0,0,0,.14)); }
  .tile .name{ font-size:clamp(15px,4.2vw,20px); text-shadow:0 2px 0 rgba(0,0,0,.12); }
  .tile.t0{background:linear-gradient(160deg,#ff9aa2,#ff7a92);}
  .tile.t1{background:linear-gradient(160deg,#7fd8d4,#4fb8c9);}
  .tile.t2{background:linear-gradient(160deg,#ffd166,#ffae42);}
  .tile.t3{background:linear-gradient(160deg,#b5ead7,#7ccfa6);}
  .tile.t4{background:linear-gradient(160deg,#c9b1ff,#a98cf0);}
  .tile:active{ transform:translateY(6px); box-shadow:0 3px 0 var(--shadow),0 6px 12px rgba(0,0,0,.12); }

  /* GAME */
  .gametop{ width:100%; display:flex; align-items:center; gap:8px; z-index:3; margin-bottom:4px; }
  .homebtn{ border:none; background:rgba(255,255,255,.82); color:var(--ink); font-family:'Fredoka',sans-serif; font-weight:600; font-size:15px; border-radius:16px; padding:9px 15px; cursor:pointer; box-shadow:0 4px 0 rgba(59,58,82,.12); white-space:nowrap; }
  body.arabic .homebtn{ font-family:'Baloo Bhaijaan 2','Cairo',sans-serif; }
  .homebtn:active{ transform:translateY(3px); box-shadow:none; }
  .stars{ flex:1; min-height:34px; display:flex; gap:6px; align-items:center; justify-content:center; flex-wrap:wrap; }
  .star{font-size:22px; line-height:1; transform:scale(.4); opacity:.25; transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;}
  .star.on{transform:scale(1); opacity:1;}

  .prompt{ z-index:2; text-align:center; margin:6px 0 10px; display:flex; flex-direction:column; align-items:center; }
  .prompt p{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:clamp(18px,4.5vw,24px); color:var(--soft); margin:0 0 14px; }
  body.arabic .prompt p{ font-family:'Baloo Bhaijaan 2','Cairo',sans-serif; }
  .speaker{ width:104px;height:104px;border:none;border-radius:50%; background:#fff; color:var(--ink); box-shadow:0 10px 0 var(--shadow), 0 14px 24px rgba(0,0,0,.12); font-size:46px; cursor:pointer; display:flex;align-items:center;justify-content:center; transition:transform .12s; position:relative; }
  .speaker:active{transform:translateY(6px); box-shadow:0 4px 0 var(--shadow),0 6px 12px rgba(0,0,0,.12);}
  .speaker .ring{position:absolute; inset:-10px; border-radius:50%; border:5px solid #ffd166; opacity:0;}
  .speaker.playing .ring{animation:ring 1s ease-out infinite;}
  @keyframes ring{0%{opacity:.7;transform:scale(.85)}100%{opacity:0;transform:scale(1.25)}}

  .cards{ z-index:2; flex:1; width:100%; display:flex; align-items:center; justify-content:center; gap:clamp(12px,3.5vw,26px); padding:6px 0; }
  .card{
    flex:1 1 0; max-width:210px; aspect-ratio:3/4; border:none; border-radius:34px;
    font-family:'Fredoka',sans-serif; font-weight:700; font-size:clamp(60px,17vw,120px); color:#fff;
    cursor:pointer; position:relative; box-shadow:0 12px 0 var(--shadow), 0 18px 30px rgba(0,0,0,.14);
    transition:transform .12s ease, box-shadow .12s ease; text-shadow:0 4px 0 rgba(0,0,0,.12);
    display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  body.arabic .card{ font-family:'Baloo Bhaijaan 2','Cairo',sans-serif; }
  .card:active{transform:translateY(8px); box-shadow:0 4px 0 var(--shadow),0 8px 14px rgba(0,0,0,.14);}
  .card.c0{background:linear-gradient(160deg,#ff9aa2,#ff7a92);}
  .card.c1{background:linear-gradient(160deg,#7fd8d4,#4fb8c9);}
  .card.c2{background:linear-gradient(160deg,#ffd166,#ffae42);}
  .cardEmoji{ font-size:clamp(54px,15vw,104px); line-height:1; text-shadow:none; }
  .cardShape{ width:56%; height:56%; display:flex; align-items:center; justify-content:center; filter:drop-shadow(0 4px 0 rgba(0,0,0,.12)); }
  .cardShape svg{ width:100%; height:100%; }
  .card .glow{position:absolute; inset:0; background:rgba(255,255,255,.85); opacity:0; pointer-events:none;}
  .card.correct{animation:pop .55s ease;}
  .card.correct .glow{animation:glow .65s ease;}
  .card.correct::after{ content:"\2713"; position:absolute; inset:0; display:flex;align-items:center;justify-content:center; font-size:92px; color:#fff; text-shadow:0 3px 10px rgba(0,0,0,.45); animation:check .5s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
  @keyframes glow{0%{opacity:.9}100%{opacity:0}}
  @keyframes check{0%{transform:scale(.2);opacity:0}60%{transform:scale(1.15);opacity:1}100%{transform:scale(1);opacity:1}}
  .card.wrong{animation:wiggle .45s ease;}
  @keyframes wiggle{0%,100%{transform:translateX(0)}20%{transform:translateX(-9px) rotate(-2deg)}40%{transform:translateX(9px) rotate(2deg)}60%{transform:translateX(-6px)}80%{transform:translateX(6px)}}
  .card.fade{opacity:0; transform:scale(.85); transition:opacity .25s, transform .25s;}

  .bottombar{ z-index:2; display:flex; gap:14px; align-items:center; margin-top:8px; }
  .mini{ border:none; background:rgba(255,255,255,.7); color:var(--soft); border-radius:18px; padding:10px 16px; font-family:'Quicksand'; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 4px 0 rgba(59,58,82,.1); }
  body.arabic .mini{ font-family:'Baloo Bhaijaan 2','Cairo',sans-serif; }
  .mini:active{transform:translateY(3px); box-shadow:none;}

  .voicepanel{ position:absolute; inset:0; z-index:20; background:rgba(59,58,82,.35); backdrop-filter:blur(3px); display:none; align-items:center; justify-content:center; padding:24px; }
  .voicepanel.open{ display:flex; }
  .vp-card{ background:#fff; border-radius:26px; padding:24px; width:100%; max-width:420px; box-shadow:0 18px 40px rgba(0,0,0,.25); text-align:center; }
  .vp-card h2{font-family:'Fredoka',sans-serif; margin:0 0 6px; font-size:24px; color:var(--ink);}
  body.arabic .vp-card h2{ font-family:'Baloo Bhaijaan 2','Cairo',sans-serif; }
  .vp-note{font-size:13px; color:var(--soft); margin:0 0 16px; line-height:1.45;}
  .vp-card select{ width:100%; padding:14px; border-radius:14px; border:2px solid #e7e3f0; font-weight:700; font-size:15px; color:var(--ink); background:#faf9ff; }
  .vp-row{display:flex; gap:10px; margin-top:16px;}
  .vp-row .mini{flex:1; padding:14px; font-size:15px;}
  .vp-test{background:#a0e7e5 !important; color:#1f5e60 !important;}
  .vp-done{background:#7bd389 !important; color:#fff !important;}
  .vp-tip{font-size:12px; color:var(--soft); margin:14px 0 0; line-height:1.45; min-height:16px;}
  .vp-now{font-size:12px; color:var(--soft); margin:10px 0 0; min-height:14px; line-height:1.4;}
  .vp-now.warn{color:#c0392b; font-weight:700;}
</style>
</head>
<body>
<div class="stage">
  <div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div>

  <!-- HOME -->
  <div class="screen active" id="home">
    <div class="home-head">
      <h1>Tiny Taps</h1>
      <p id="subtitle"></p>
      <div class="langbar" id="langBar">
        <button class="langpill" data-lang="en">English</button>
        <button class="langpill" data-lang="ar">العربية</button>
        <button class="langpill" data-lang="hy">Հայերեն</button>
      </div>
    </div>
    <div class="grid">
      <button class="tile t0" data-game="letters"><span class="emoji">&#x1F524;</span><span class="name"></span></button>
      <button class="tile t1" data-game="animals"><span class="emoji">&#x1F436;</span><span class="name"></span></button>
      <button class="tile t2" data-game="colors"><span class="emoji">&#x1F3A8;</span><span class="name"></span></button>
      <button class="tile t3" data-game="shapes"><span class="emoji">&#x1F537;</span><span class="name"></span></button>
      <button class="tile t4 span2" data-game="numbers"><span class="emoji">&#x1F522;</span><span class="name"></span></button>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen" id="game">
    <div class="gametop">
      <button class="homebtn" id="homeBtn"></button>
      <div class="stars" id="stars"></div>
    </div>
    <div class="prompt">
      <p id="promptText"></p>
      <button class="speaker" id="speaker" aria-label="Play again"><span class="ring"></span>&#x1F50A;</button>
    </div>
    <div class="cards" id="cards"></div>
    <div class="bottombar">
      <button class="mini" id="newSet"></button>
      <button class="mini" id="voiceBtn"></button>
    </div>
    <div class="voicepanel" id="voicePanel">
      <div class="vp-card">
        <h2 id="vpTitle"></h2>
        <p class="vp-note" id="vpNote"></p>
        <select id="voiceSelect"></select>
        <p class="vp-now" id="vpNow"></p>
        <div class="vp-row">
          <button class="mini vp-test" id="voiceTest"></button>
          <button class="mini vp-done" id="voiceClose"></button>
        </div>
        <p class="vp-tip" id="voiceTip"></p>
      </div>
    </div>
  </div>
</div>

<script>
(function(){
  function emo(cp){ return String.fromCodePoint(cp); }
  function eastern(n){ return String(n).replace(/[0-9]/g,function(d){ return String.fromCharCode(0x0660+(+d)); }); }

  // ---- shared content (emoji / color / shape are universal; only spoken word changes by language) ----
  var ANIMALS = [
    {key:"dog",     render:{type:"emoji",emoji:emo(0x1F436)}, say:{en:"dog",     ar:"كلب",   hy:"շուն"}},
    {key:"cat",     render:{type:"emoji",emoji:emo(0x1F431)}, say:{en:"cat",     ar:"قطة",   hy:"կատու"}},
    {key:"cow",     render:{type:"emoji",emoji:emo(0x1F42E)}, say:{en:"cow",     ar:"بقرة",  hy:"կով"}},
    {key:"pig",     render:{type:"emoji",emoji:emo(0x1F437)}, say:{en:"pig",     ar:"خنزير", hy:"խոզ"}},
    {key:"frog",    render:{type:"emoji",emoji:emo(0x1F438)}, say:{en:"frog",    ar:"ضفدع",  hy:"գորտ"}},
    {key:"lion",    render:{type:"emoji",emoji:emo(0x1F981)}, say:{en:"lion",    ar:"أسد",   hy:"առյուծ"}},
    {key:"bear",    render:{type:"emoji",emoji:emo(0x1F43B)}, say:{en:"bear",    ar:"دب",    hy:"արջ"}},
    {key:"monkey",  render:{type:"emoji",emoji:emo(0x1F435)}, say:{en:"monkey",  ar:"قرد",   hy:"կապիկ"}},
    {key:"horse",   render:{type:"emoji",emoji:emo(0x1F434)}, say:{en:"horse",   ar:"حصان",  hy:"ձի"}},
    {key:"duck",    render:{type:"emoji",emoji:emo(0x1F986)}, say:{en:"duck",    ar:"بطة",   hy:"բադ"}},
    {key:"rabbit",  render:{type:"emoji",emoji:emo(0x1F430)}, say:{en:"rabbit",  ar:"أرنب",  hy:"նապաստակ"}},
    {key:"elephant",render:{type:"emoji",emoji:emo(0x1F418)}, say:{en:"elephant",ar:"فيل",   hy:"փիղ"}},
    {key:"fish",    render:{type:"emoji",emoji:emo(0x1F41F)}, say:{en:"fish",    ar:"سمكة",  hy:"ձուկ"}},
    {key:"sheep",   render:{type:"emoji",emoji:emo(0x1F411)}, say:{en:"sheep",   ar:"خروف",  hy:"ոչխար"}}
  ];
  var COLORS = [
    {key:"red",    render:{type:"color",color:"#e63946"}, say:{en:"red",    ar:"أحمر",    hy:"կարմիր"}},
    {key:"blue",   render:{type:"color",color:"#3a86ff"}, say:{en:"blue",   ar:"أزرق",    hy:"կապույտ"}},
    {key:"yellow", render:{type:"color",color:"#ffcf33"}, say:{en:"yellow", ar:"أصفر",    hy:"դեղին"}},
    {key:"green",  render:{type:"color",color:"#2bb24c"}, say:{en:"green",  ar:"أخضر",    hy:"կանաչ"}},
    {key:"orange", render:{type:"color",color:"#ff7b00"}, say:{en:"orange", ar:"برتقالي", hy:"նարնջագույն"}},
    {key:"purple", render:{type:"color",color:"#9b5de5"}, say:{en:"purple", ar:"بنفسجي",  hy:"մանուշակագույն"}},
    {key:"pink",   render:{type:"color",color:"#ff7eb6"}, say:{en:"pink",   ar:"وردي",    hy:"վարդագույն"}},
    {key:"brown",  render:{type:"color",color:"#9c6b3f"}, say:{en:"brown",  ar:"بني",     hy:"շագանակագույն"}}
  ];
  var SHAPE_SVG = {
    circle:'<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="42" fill="#fff"/></svg>',
    square:'<svg viewBox="0 0 100 100"><rect x="13" y="13" width="74" height="74" rx="10" fill="#fff"/></svg>',
    triangle:'<svg viewBox="0 0 100 100"><polygon points="50,12 90,86 10,86" fill="#fff"/></svg>',
    star:'<svg viewBox="0 0 100 100"><polygon points="50,7 61,38 94,38 67,58 78,90 50,70 22,90 33,58 6,38 39,38" fill="#fff"/></svg>',
    heart:'<svg viewBox="0 0 100 100"><path d="M50,84 C18,60 10,40 24,28 C34,20 47,23 50,35 C53,23 66,20 76,28 C90,40 82,60 50,84 Z" fill="#fff"/></svg>',
    diamond:'<svg viewBox="0 0 100 100"><polygon points="50,9 89,50 50,91 11,50" fill="#fff"/></svg>'
  };
  var SHAPES = [
    {key:"circle",  render:{type:"shape",svg:SHAPE_SVG.circle},   say:{en:"circle",  ar:"دائرة", hy:"շրջան"}},
    {key:"square",  render:{type:"shape",svg:SHAPE_SVG.square},   say:{en:"square",  ar:"مربع",  hy:"քառակուսի"}},
    {key:"triangle",render:{type:"shape",svg:SHAPE_SVG.triangle}, say:{en:"triangle",ar:"مثلث",  hy:"եռանկյուն"}},
    {key:"star",    render:{type:"shape",svg:SHAPE_SVG.star},     say:{en:"star",    ar:"نجمة",  hy:"աստղ"}},
    {key:"heart",   render:{type:"shape",svg:SHAPE_SVG.heart},    say:{en:"heart",   ar:"قلب",   hy:"սիրտ"}},
    {key:"diamond", render:{type:"shape",svg:SHAPE_SVG.diamond},  say:{en:"diamond", ar:"معيّن", hy:"շեղանկյուն"}}
  ];
  var AR_LETTERS = ["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","ه","و","ي"];
  var AR_NUMWORDS = ["واحد","اثنان","ثلاثة","أربعة","خمسة","ستة","سبعة","ثمانية","تسعة","عشرة"];
  var HY_LETTERS = ["Ա","Բ","Գ","Դ","Ե","Զ","Է","Ը","Թ","Ժ","Ի","Լ","Խ","Ծ","Կ","Հ","Ձ","Ղ","Ճ","Մ","Յ","Ն","Շ","Ո","Չ","Պ","Ջ","Ռ","Ս","Վ","Տ","Ր","Ց","Ւ","Փ","Ք","Օ","Ֆ"];
  var HY_NUMWORDS = ["մեկ","երկու","երեք","չորս","հինգ","վեց","յոթ","ութ","ինը","տասը"];

  function buildGames(lang){
    var letters, numbers, i;
    if(lang==='ar'){
      letters = AR_LETTERS.map(function(L){ return {key:L, say:L, render:{type:'glyph',label:L}}; });
      numbers = [];
      for(i=1;i<=10;i++){ numbers.push({key:'n'+i, say:AR_NUMWORDS[i-1], render:{type:'glyph',label:eastern(i)}}); }
    } else if(lang==='hy'){
      letters = HY_LETTERS.map(function(L){ return {key:L, say:L, render:{type:'glyph',label:L}}; });
      numbers = [];
      for(i=1;i<=10;i++){ numbers.push({key:'n'+i, say:HY_NUMWORDS[i-1], render:{type:'glyph',label:String(i)}}); }
    } else {
      letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("").map(function(L){ return {key:L, say:(EN_OVR[L]||L), render:{type:'glyph',label:L}}; });
      numbers = [];
      for(i=1;i<=10;i++){ numbers.push({key:'n'+i, say:String(i), render:{type:'glyph',label:String(i)}}); }
    }
    function L(arr){ return arr.map(function(it){ return {key:it.key, say:it.say[lang], render:it.render}; }); }
    var T = I18N[lang];
    return {
      letters:{prompt:T.prompts.letters, items:letters},
      numbers:{prompt:T.prompts.numbers, items:numbers},
      animals:{prompt:T.prompts.animals, items:L(ANIMALS)},
      colors:{prompt:T.prompts.colors,   items:L(COLORS)},
      shapes:{prompt:T.prompts.shapes,   items:L(SHAPES)}
    };
  }

      newSetBtn=document.getElementById('newSet'), voiceBtn=document.getElementById('voiceBtn'),
      voicePanel=document.getElementById('voicePanel'), voiceSelect=document.getElementById('voiceSelect'),
      voiceTest=document.getElementById('voiceTest'), voiceClose=document.getElementById('voiceClose'),
      voiceTip=document.getElementById('voiceTip'), homeBtn=document.getElementById('homeBtn'),
      subtitleEl=document.getElementById('subtitle'), langBar=document.getElementById('langBar'),
      vpTitle=document.getElementById('vpTitle'), vpNote=document.getElementById('vpNote'),
      vpNow=document.getElementById('vpNow');
  var tiles=document.querySelectorAll('.tile');
  var langPills=document.querySelectorAll('.langpill');

  var LANG='en', GAMESBYTYPE=null, G=null, target=null, locked=false, streak=0, MAX_STARS=10, chosenVoice=null;

  // ---- stars ----
  for(var i=0;i<MAX_STARS;i++){ var s=document.createElement('span'); s.className='star'; s.textContent=emo(0x2B50); starsEl.appendChild(s); }
  function paintStars(){ var n=starsEl.children; for(var i=0;i<n.length;i++){ if(i<streak) n[i].classList.add('on'); else n[i].classList.remove('on'); } }

  // ---- voice (per-language memory + language-matched auto pick) ----
  function voiceKey(){ return 'tinyTapsVoice_'+LANG; }
  function getSavedVoiceURI(){ try{ return window.localStorage.getItem(voiceKey()); }catch(e){ return null; } }
  function saveVoiceURI(u){ try{ window.localStorage.setItem(voiceKey(),u); }catch(e){} }
  function removeSavedVoice(){ try{ window.localStorage.removeItem(voiceKey()); }catch(e){} }
  function langPref(v){ return !!v.lang && v.lang.toLowerCase().indexOf(LANG)===0; }
  function pickVoice(){
    if(!('speechSynthesis' in window)) return;
    var voices=window.speechSynthesis.getVoices(); if(!voices.length) return;
    var saved=getSavedVoiceURI();
    if(saved){ var m=voices.find(function(v){return v.voiceURI===saved;}); if(m){ chosenVoice=m; return; } }
    chosenVoice = voices.find(langPref) || voices.find(function(v){return /^en/i.test(v.lang);}) || voices[0];
  }
  if('speechSynthesis' in window){ pickVoice(); window.speechSynthesis.onvoiceschanged=function(){ pickVoice(); populateVoices(); }; }
  function populateVoices(){
    voiceSelect.innerHTML='';
    // Default option: the nicer Google online voice (English, Arabic, Armenian).
    var on=document.createElement('option'); on.value='__online__';
    on.textContent='\ud83c\udf10 Google online voice (needs internet)';
    if(usingOnline()) on.selected=true;
    voiceSelect.appendChild(on);
    if(!('speechSynthesis' in window)){ return; }
    var voices=window.speechSynthesis.getVoices();
    if(!voices.length){ return; }
    voices=voices.slice().sort(function(a,b){ var aa=langPref(a)?0:1,bb=langPref(b)?0:1; if(aa!==bb)return aa-bb; return a.name.localeCompare(b.name); });
    voices.forEach(function(v){ var o=document.createElement('option'); o.value=v.voiceURI; o.textContent=v.name+' ('+v.lang+')'; if(!usingOnline()&&chosenVoice&&v.voiceURI===chosenVoice.voiceURI)o.selected=true; voiceSelect.appendChild(o); });
  }
  function voiceByURI(u){ var voices=window.speechSynthesis.getVoices(); return voices.find(function(v){return v.voiceURI===u;})||null; }
  function hasVoiceFor(code){
    if(!('speechSynthesis' in window)) return false;
    return window.speechSynthesis.getVoices().some(function(v){ return !!v.lang && v.lang.toLowerCase().indexOf(code)===0; });
  }
  // Default to the Google online voice for all languages, unless the user explicitly picked a device voice.
  function usingOnline(){ return !getSavedVoiceURI(); }

  function langName(code){ return code==='ar' ? 'Arabic' : code==='hy' ? 'Armenian' : 'English'; }
  function updateNow(){
    if(!('speechSynthesis' in window) && !usingOnline()){ vpNow.textContent='Speech is not supported in this browser.'; vpNow.classList.add('warn'); return; }
    if(usingOnline()){
      vpNow.textContent = 'Now using: Google online '+langName(LANG)+' voice (needs internet)';
      vpNow.classList.remove('warn');
    } else if(chosenVoice){
      vpNow.textContent = 'Now using: '+chosenVoice.name+' ('+chosenVoice.lang+')';
      var bad = (LANG==='ar' || LANG==='hy') && chosenVoice.lang.toLowerCase().indexOf(LANG)!==0;
      vpNow.classList.toggle('warn', bad);
      if(bad){ vpNow.textContent += '  —  no '+langName(LANG)+' voice found on this device'; }
    } else {
      vpNow.textContent = 'No voice selected yet.'; vpNow.classList.remove('warn');
    }
  }

  function speakLocal(text){
    if(!('speechSynthesis' in window)) return;
    try{
      window.speechSynthesis.cancel();
      var u=new SpeechSynthesisUtterance(text);
      if(chosenVoice) u.voice=chosenVoice;
      u.rate=0.82; u.pitch=1.1; u.volume=1;
      speakerEl.classList.add('playing');
      u.onend=function(){ speakerEl.classList.remove('playing'); };
      u.onerror=function(){ speakerEl.classList.remove('playing'); };
      window.speechSynthesis.speak(u);
    }catch(e){ speakerEl.classList.remove('playing'); }
  }

  var onlineAudio=null, onlineGuard=null, roundTimers=[];
  function clearRoundTimers(){ for(var i=0;i<roundTimers.length;i++) clearTimeout(roundTimers[i]); roundTimers=[]; }
  // Halt every pending game sound/timer on navigation so audio never bleeds onto the home screen.
  function stopGameAudio(){
    clearRoundTimers();
    if(onlineGuard){ clearTimeout(onlineGuard); onlineGuard=null; }
    if('speechSynthesis' in window){ try{ window.speechSynthesis.cancel(); }catch(e){} }
    if(onlineAudio){ try{ onlineAudio.pause(); }catch(e){} onlineAudio=null; }
    speakerEl.classList.remove('playing');
  }
  function speakOnline(text){
    try{
      if('speechSynthesis' in window){ try{ window.speechSynthesis.cancel(); }catch(e){} }
      if(onlineAudio){ try{ onlineAudio.pause(); }catch(e){} onlineAudio=null; }
      var url='https://translate.googleapis.com/translate_tts?ie=UTF-8&client=tw-ob&tl='+LANG+'&q='+encodeURIComponent(text);
      var a=new Audio(url); onlineAudio=a; a.playbackRate=0.9;
      speakerEl.classList.add('playing');
      var fellBack=false, started=false;
      function fallback(){ if(fellBack) return; fellBack=true; clearTimeout(guard); speakerEl.classList.remove('playing'); speakLocal(text); }
      var guard=setTimeout(function(){ if(!started) fallback(); }, 1500); onlineGuard=guard; // never start? use the local engine
      a.addEventListener('playing', function(){ started=true; clearTimeout(guard); });
      a.addEventListener('ended', function(){ clearTimeout(guard); speakerEl.classList.remove('playing'); });
      a.addEventListener('error', fallback);   // network/load failure -> local engine
      a.play().catch(fallback);                // autoplay/play() rejection -> local engine
    }catch(e){ speakerEl.classList.remove('playing'); speakLocal(text); }
  }

  function speak(text){
    if(text==null || text==='') return;
    if(usingOnline()) speakOnline(text); else speakLocal(text);
  }

  // Recorded clips take priority (currently Armenian). Falls back to TTS if a clip is missing.
  function playClip(src){
    try{
      if('speechSynthesis' in window){ try{ window.speechSynthesis.cancel(); }catch(e){} }
      if(onlineAudio){ try{ onlineAudio.pause(); }catch(e){} onlineAudio=null; }
      var a=new Audio(src); onlineAudio=a;
      speakerEl.classList.add('playing');
      a.addEventListener('ended', function(){ speakerEl.classList.remove('playing'); });
      a.addEventListener('error', function(){ speakerEl.classList.remove('playing'); });
      a.play().catch(function(){ speakerEl.classList.remove('playing'); });
    }catch(e){ speakerEl.classList.remove('playing'); }
  }
  function playItem(item){
    if(!item) return;
    var clip = (LANG==='hy' && typeof HY_CLIPS!=='undefined') ? HY_CLIPS[item.key] : null;
    if(clip){ playClip(clip); } else { speak(item.say); }
  }

  // ---- rounds (no-repeat target cycling) ----
  function shuffle(a){ for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i];a[i]=a[j];a[j]=t; } return a; }
  var queue=[], lastKey=null;
  function nextTarget(){
    if(!queue.length){ queue=shuffle(G.items.slice()); if(lastKey && queue[0].key===lastKey && queue.length>1){ queue.push(queue.shift()); } }
    var it=queue.shift(); lastKey=it.key; return it;
  }
  function applyContent(card,item){
    var r=item.render;
    if(r.type==='glyph'){ card.insertAdjacentText('beforeend', r.label); }
    else if(r.type==='emoji'){ var e=document.createElement('span'); e.className='cardEmoji'; e.textContent=r.emoji; card.appendChild(e); }
    else if(r.type==='shape'){ var sh=document.createElement('span'); sh.className='cardShape'; sh.innerHTML=r.svg; card.appendChild(sh); }
    else if(r.type==='color'){ card.style.background=r.color; }
  }
  function newRound(speakNow){
    locked=false;
    target=nextTarget();
    var others=shuffle(G.items.filter(function(it){ return it.key!==target.key; }));
    var trio=shuffle([target, others[0], others[1]]);
    cardsEl.innerHTML='';
    trio.forEach(function(item,i){
      var b=document.createElement('button'); b.className='card c'+i;
      var glow=document.createElement('span'); glow.className='glow'; b.appendChild(glow);
      applyContent(b,item);
      b.addEventListener('click', function(){ onPick(b,item); });
      cardsEl.appendChild(b);
    });
    if(speakNow!==false) roundTimers.push(setTimeout(function(){ playItem(target); }, 350));
  }
  function onPick(btn,item){
    if(locked) return;
    if(item.key===target.key){
      locked=true; btn.classList.add('correct');
      streak=Math.min(MAX_STARS,streak+1); paintStars();
      playItem(target);   // repeat the correct answer as a reward
      roundTimers.push(setTimeout(function(){ Array.prototype.forEach.call(cardsEl.children,function(c){ c.classList.add('fade'); }); },900));
      roundTimers.push(setTimeout(function(){ if(streak>=MAX_STARS) streak=0; paintStars(); newRound(true); },1600));
    } else {
      btn.classList.add('wrong');
      roundTimers.push(setTimeout(function(){ btn.classList.remove('wrong'); },460));
      roundTimers.push(setTimeout(function(){ playItem(item); },250));   // say what they actually tapped
    }
  }

  // ---- controls ----
  speakerEl.addEventListener('click', function(){ if(target) playItem(target); });
  newSetBtn.addEventListener('click', function(){ if(!locked) newRound(true); });
  function vpSample(){ return target ? target.say : (LANG==='ar'?'\u0627':LANG==='hy'?'\u0531':'B'); }
  voiceBtn.addEventListener('click', function(){ populateVoices(); updateNow(); voiceTip.textContent=''; voicePanel.classList.add('open'); });
  voiceSelect.addEventListener('change', function(){
    if(voiceSelect.value==='__online__'){ removeSavedVoice(); updateNow(); speak(vpSample()); return; }
    var v=voiceByURI(voiceSelect.value); if(v){ chosenVoice=v; saveVoiceURI(v.voiceURI); updateNow(); speak(vpSample()); }
  });
  voiceTest.addEventListener('click', function(){
    if(voiceSelect.value==='__online__'){ removeSavedVoice(); }
    else { var v=voiceByURI(voiceSelect.value); if(v){ chosenVoice=v; saveVoiceURI(v.voiceURI); } }
    updateNow(); speak(vpSample()); voiceTip.textContent=I18N[LANG].vp.tip;
  });
  voiceClose.addEventListener('click', function(){ voicePanel.classList.remove('open'); if(target) playItem(target); });

  // ---- language ----
  function applyLang(lang){
    LANG = (lang==='ar' || lang==='hy') ? lang : 'en';
    try{ window.localStorage.setItem('tinyTapsLang', LANG); }catch(e){}
    var T = I18N[LANG];
    document.documentElement.setAttribute('dir', T.dir);
    document.body.classList.toggle('arabic', LANG==='ar');
    document.body.classList.toggle('armenian', LANG==='hy');
    subtitleEl.textContent = T.subtitle;
    homeBtn.textContent = T.home;
    newSetBtn.textContent = T.newRound;
    voiceBtn.textContent = T.voice;
    vpTitle.textContent = T.vp.title;
    vpNote.textContent = T.vp.note;
    voiceTest.textContent = T.vp.test;
    voiceClose.textContent = T.vp.done;
    for(var k=0;k<tiles.length;k++){ tiles[k].querySelector('.name').textContent = T.tiles[tiles[k].getAttribute('data-game')]; }
    for(var p=0;p<langPills.length;p++){ langPills[p].classList.toggle('active', langPills[p].getAttribute('data-lang')===LANG); }
    GAMESBYTYPE = buildGames(LANG);
    pickVoice();
  }

  // ---- navigation ----
  function showScreen(id){ var sc=document.querySelectorAll('.screen'); for(var i=0;i<sc.length;i++) sc[i].classList.remove('active'); document.getElementById(id).classList.add('active'); }
  function launchGame(type){
    G=GAMESBYTYPE[type]; if(!G) return;
    promptEl.textContent=G.prompt;
    stopGameAudio(); if('speechSynthesis' in window){ pickVoice(); }
    streak=0; paintStars(); queue=[]; lastKey=null;
    showScreen('game'); newRound(true);
  }
  function goHome(){ stopGameAudio(); voicePanel.classList.remove('open'); showScreen('home'); }

  for(var k=0;k<tiles.length;k++){ (function(t){ t.addEventListener('click', function(){ launchGame(t.getAttribute('data-game')); }); })(tiles[k]); }
  homeBtn.addEventListener('click', goHome);
  for(var p=0;p<langPills.length;p++){ (function(b){ b.addEventListener('click', function(){ applyLang(b.getAttribute('data-lang')); }); })(langPills[p]); }

  // ---- init ----
  var startLang='en'; try{ startLang=window.localStorage.getItem('tinyTapsLang')||'en'; }catch(e){}
  applyLang(startLang);
})();
</script>
</body>
</html>
